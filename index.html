<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcíssima Doces</title>
    

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="cabeçalhoprincipal">
        <img id="logo" src="imagens/FAVICONES.png" alt="Logo Dulcíssima Doces" class="logo">
    </header>

    <main>
        <section class="boas-vindas">
            <h1>Seja Bem-vindo!</h1>
            <p>Estamos sempre empenhados em proporcionar a melhor experiência para nossos clientes.</p>
        </section>

        <section class="catalogo-container">
            <h2 class="catalogo-titulo">Confira nosso catálogo</h2>
            
            <div class="grid-produtos">
                
                <div class="card">
                    <h3>Palha Italiana</h3>
                    <img src="https://cdn.casaeculinaria.com/wp-content/uploads/2024/01/22105413/Palha-italiana-de-oreo-600x400.webp" alt="Palha Italiana">                </div>

                <div class="card">
                    <h3>Mini Pudim</h3>
                    <img src="https://receitatodahora.com.br/wp-content/uploads/2025/02/pudim-de-leite-condensado1802-1024x683.webp" alt="Mini Pudim">
                </div>

                <div class="card">
                    <h3>Alfajor</h3>
                    <img src="https://reservademinas.com.br/wp-content/uploads/2024/11/receitas8.6.png" alt="Alfajor">
                </div>

                <div class="card">
                    <h3>Brownie</h3>
                    <img src="https://moinhoglobo.com.br/wp-content/uploads/2016/02/51-Brownie-768x512.jpg" alt="Brownie">
                </div>

            </div>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Dulcíssima Doces.</p>
    </footer>

</body>
</html>
